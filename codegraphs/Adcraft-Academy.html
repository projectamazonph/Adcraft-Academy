const groupColors = {"root": "#e74c3c", "examples": "#3498db", "scripts": "#2ecc71", "src": "#f39c12", "e2e": "#9b59b6"};

const svg = d3.select("#graph").append("svg")
    .attr("width", "100%")
    .attr("height", "100%")
    .call(d3.zoom().on("zoom", (event) => container.attr("transform", event.transform)));

const container = svg.append("g");

const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(80))
    .force("charge", d3.forceManyBody().strength(-200))
    .force("center", d3.forceCenter(svg.node().clientWidth / 2, svg.node().clientHeight / 2))
    .force("collision", d3.forceCollide().radius(20));

const link = container.append("g")
    .selectAll("line")
    .data(links)
    .join("line")
    .attr("stroke", "#999")
    .attr("stroke-opacity", 0.6)
    .attr("stroke-width", 1);

const node = container.append("g")
    .selectAll("g")
    .data(nodes)
    .join("g")
    .call(d3.drag()
        .on("start", dragstarted)
        .on("drag", dragged)
        .on("end", dragended));

node.append("circle")
    .attr("r", 6)
    .attr("fill", d => groupColors[d.group] || '#999')
    .attr("stroke", "#fff")
    .attr("stroke-width", 1.5);

node.append("text")
    .text(d => d.file)
    .attr("x", 8)
    .attr("y", 3)
    .attr("font-size", "10px")
    .attr("fill", "#333");

node.append("title").text(d => d.id);

simulation.on("tick", () => {{
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${{d.x}},${{d.y}})`);
}});

function dragstarted(event, d) {{
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
}}
function dragged(event, d) {{ d.fx = event.x; d.fy = event.y; }}
function dragended(event, d) {{
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null; d.fy = null;
}}
</script>
